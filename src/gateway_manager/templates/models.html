<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型管理 - SGL-Model-Gateway</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SGL-Model-Gateway 管理界面</h1>
            <nav>
                <a href="/">首页</a>
                <a href="/models" class="active">模型管理</a>
                <a href="/gateway">网关配置</a>
                <a href="/settings">设置</a>
            </nav>
        </header>

        <main>
            <section class="models-header">
                <h2>模型管理</h2>
                <button class="btn btn-primary" onclick="showCreateModelModal()">创建新模型</button>
            </section>

            <section class="models-list">
                <div id="models-container" class="models-grid">
                    <p class="loading">加载中...</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 SGL-Model-Gateway Manager</p>
        </footer>
    </div>

    <div id="create-model-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('create-model-modal')">&times;</span>
            <h2>创建新模型</h2>
            <form id="create-model-form">
                <div class="form-group">
                    <label for="model-name">模型名称</label>
                    <input type="text" id="model-name" name="name" required placeholder="例如: qwen3-35b">
                </div>

                <div class="form-group">
                    <label for="backend-type">后端类型</label>
                    <select id="backend-type" name="backend_type" required onchange="updateFormFields()">
                        <option value="sglang">SGLang</option>
                        <option value="vllm">vLLM</option>
                        <option value="lmdeploy">LMDeploy</option>
                        <option value="tabby">Tabby</option>
                        <option value="openvino">OpenVINO</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="model-path">模型路径</label>
                    <input type="text" id="model-path" name="model_path" required placeholder="/data/models/Qwen3___5-35B-A3B">
                </div>

                <div class="form-group">
                    <label for="served-model-name">服务模型名称</label>
                    <input type="text" id="served-model-name" name="served_model_name" required placeholder="qwen3.5">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="model-host">监听地址</label>
                        <input type="text" id="model-host" name="host" value="0.0.0.0" required>
                    </div>
                    <div class="form-group">
                        <label for="model-port">端口</label>
                        <input type="number" id="model-port" name="port" value="30000" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tensor-parallel">张量并行数</label>
                        <input type="number" id="tensor-parallel" name="tensor_parallel" value="1" min="1" max="8">
                    </div>
                    <div class="form-group">
                        <label for="gpu-ids">GPU IDs (逗号分隔)</label>
                        <input type="text" id="gpu-ids" name="gpu_ids" placeholder="0,1,2,3">
                    </div>
                </div>

                <div class="form-group">
                    <label for="model-image">Docker 镜像</label>
                    <input type="text" id="model-image" name="image" placeholder="留空使用默认镜像">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">创建</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('create-model-modal')">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div id="model-detail-modal" class="modal">
        <div class="modal-content modal-large">
            <span class="close" onclick="closeModal('model-detail-modal')">&times;</span>
            <h2>模型详情</h2>
            <div id="model-detail-content">
                <p class="loading">加载中...</p>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="refreshModelDetail()">刷新</button>
                <button class="btn btn-secondary" onclick="closeModal('model-detail-modal')">关闭</button>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/models.js"></script>
</body>
</html>
