<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置 - SGL-Model-Gateway</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SGL-Model-Gateway 管理界面</h1>
            <nav>
                <a href="/">首页</a>
                <a href="/models">模型管理</a>
                <a href="/gateway">网关配置</a>
                <a href="/settings" class="active">设置</a>
            </nav>
        </header>

        <main>
            <section class="settings-header">
                <h2>系统设置</h2>
            </section>

            <section class="settings-section">
                <h3>Docker 镜像配置</h3>
                <form id="images-form">
                    <div class="form-group">
                        <label for="sglang-image">SGLang 镜像</label>
                        <input type="text" id="sglang-image" name="sglang_image" value="lmsysorg/sglang:v0.5.10">
                    </div>

                    <div class="form-group">
                        <label for="vllm-image">vLLM 镜像</label>
                        <input type="text" id="vllm-image" name="vllm_image" value="vllm/vllm:v0.3.0">
                    </div>

                    <div class="form-group">
                        <label for="tabby-image">Tabby 镜像</label>
                        <input type="text" id="tabby-image" name="tabby_image" value="ghcr.io/tabby/tabby:latest">
                    </div>

                    <div class="form-group">
                        <label for="lmdeploy-image">LMDeploy 镜像</label>
                        <input type="text" id="lmdeploy-image" name="lmdeploy_image" value="openmmlab/lmdeploy:latest">
                    </div>

                    <div class="form-group">
                        <label for="openvino-image">OpenVINO 镜像</label>
                        <input type="text" id="openvino-image" name="openvino_image" value="openvino/ovms:latest">
                    </div>

                    <div class="form-group">
                        <label for="gateway-image">Gateway 镜像</label>
                        <input type="text" id="gateway-image" name="gateway_image" value="lmsysorg/sgl-model-gateway:v0.3.2">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">保存设置</button>
                        <button type="button" class="btn btn-secondary" onclick="loadSettings()">重置</button>
                    </div>
                </form>
            </section>

            <section class="settings-section">
                <h3>Docker 系统信息</h3>
                <div id="docker-info" class="info-card">
                    <p class="loading">加载中...</p>
                </div>
            </section>

            <section class="settings-section">
                <h3>导出/导入配置</h3>
                <div class="config-actions">
                    <button class="btn btn-primary" onclick="exportConfig()">导出配置</button>
                    <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">导入配置</button>
                    <input type="file" id="import-file" accept=".yaml,.yml,.json" style="display: none" onchange="importConfig(event)">
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2024 SGL-Model-Gateway Manager</p>
        </footer>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/settings.js"></script>
</body>
</html>
