version: "3.8"

x-sglang-base: &sglang-base
  image: lmsysorg/sglang:v0.5.10
  restart: unless-stopped
  volumes:
    - /data/models:/data/models
  shm_size: 32g
  ipc: host
  command: >
    python3 -m sglang.launch_server
    --model-path /data/models/Qwen3___5-35B-A3B/
    --served-model-name qwen3.5
    --host 0.0.0.0
    --port 30000

services:
  sglang-0:
    <<: *sglang-base
    container_name: sglang-0
    ports:
      - "30000:30000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  sglang-1:
    <<: *sglang-base
    container_name: sglang-1
    ports:
      - "30001:30000"
    deploy:
      resources:
